<!-- =====================================================
  기존 HTML에서 변경할 부분 3곳
  1) 네비 버튼 — 섹터맵 → 시장탭
  2) 섹터맵 페이지 전체 교체
  3) 섹터맵 JS 전체 교체
====================================================== -->

<!-- ① 네비 버튼 교체
  기존:
    <button class="nb" onclick="showPage('heatmappage',this);initHeatmap()">섹터맵</button>
  변경: -->
<button class="nb" onclick="showPage('marketpage',this);initMarket()">시장</button>


<!-- ② 페이지 교체
  기존 <div id="heatmappage" ...> 전체 삭제 후 아래로 교체 -->
<div id="marketpage" class="page" style="padding:10px 14px">

  <!-- 서브탭 -->
  <div style="display:flex;gap:4px;margin-bottom:10px;flex-wrap:wrap">
    <button class="hm-tab active" id="mt-ndx"     onclick="mktTab('ndx100',this)">🇺🇸 NASDAQ 100</button>
    <button class="hm-tab"        id="mt-sectors"  onclick="mktTab('sectors',this)">🇺🇸 섹터별</button>
    <button class="hm-tab"        id="mt-kospi"    onclick="mktTab('kospi',this)">🇰🇷 KOSPI 100</button>
    <button class="hm-tab"        id="mt-kosdaq"   onclick="mktTab('kosdaq',this)">🇰🇷 KOSDAQ 100</button>
    <span style="margin-left:auto;font-size:10px;color:#444;align-self:center" id="mkt-status">--</span>
    <button class="btn" style="font-size:11px" onclick="mktReload()">새로고침</button>
  </div>

  <!-- 로딩 -->
  <div id="mkt-loading" style="padding:40px;text-align:center;color:#444;font-size:13px">
    <span class="loading"></span> 데이터 로딩중...
  </div>

  <!-- NASDAQ 100 -->
  <div id="mkt-ndx100" style="display:none">
    <div style="font-size:11px;color:#555;margin-bottom:8px">
      등락률 기준 정렬 &nbsp;·&nbsp;
      <span style="color:#34d399">■</span> 상승 &nbsp;
      <span style="color:#f87171">■</span> 하락 &nbsp;
      <span style="color:#555">■</span> 보합
    </div>
    <!-- 가로 스크롤 카드 행 -->
    <div id="ndx-row" style="display:flex;gap:6px;overflow-x:auto;padding-bottom:8px;flex-wrap:nowrap;scrollbar-width:thin"></div>
    <!-- 전체 테이블 -->
    <div class="tw" style="margin-top:12px">
      <div class="th2"><h3>NASDAQ 100 전체 목록</h3></div>
      <div style="overflow-x:auto">
        <table>
          <thead><tr><th>#</th><th>티커</th><th>종목명</th><th>현재가</th><th>등락률</th><th>시총</th></tr></thead>
          <tbody id="ndx-table"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- 섹터별 -->
  <div id="mkt-sectors" style="display:none" id="sectors-wrap"></div>

  <!-- KOSPI -->
  <div id="mkt-kospi" style="display:none">
    <div class="tw">
      <div class="th2"><h3>KOSPI 상위 100</h3></div>
      <div style="overflow-x:auto">
        <table>
          <thead><tr><th>#</th><th>티커</th><th>종목명</th><th>현재가(원)</th><th>등락률</th><th>시총</th></tr></thead>
          <tbody id="kospi-table"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- KOSDAQ -->
  <div id="mkt-kosdaq" style="display:none">
    <div class="tw">
      <div class="th2"><h3>KOSDAQ 상위 100</h3></div>
      <div style="overflow-x:auto">
        <table>
          <thead><tr><th>#</th><th>티커</th><th>종목명</th><th>현재가(원)</th><th>등락률</th><th>시총</th></tr></thead>
          <tbody id="kosdaq-table"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>


<!-- ③ JS 교체
  기존 섹터맵 JS (// ── 섹터맵 관련 변수/함수 전체) 삭제 후 아래로 교체
  (hmInited, hmCurrentRegion, hmDataCache, hmLoadingState,
   KR_NAME, hmDispName, hmScaledCap, hmClr, hmTClr, hmFmt,
   initHmLegend, hmSelectRegion, hmReload, hmLoadMarket,
   hmRenderPanel, hmUpdateSummary, hmTipShow, hmTipHide, hmTipMove,
   hmTreemap, hmWorst, initHeatmap, window resize listener 전부 삭제) -->
<script>
// ══════════════════════════════════════════════════
// 시장 탭
// ══════════════════════════════════════════════════
var mktInited = false;
var mktCache  = {};   // { ndx100:[], sectors:{}, kospi:[], kosdaq:[] }
var mktCurTab = "ndx100";

function mktTab(tab, btn) {
  mktCurTab = tab;
  document.querySelectorAll("#marketpage .hm-tab").forEach(function(b){ b.classList.remove("active"); });
  btn.classList.add("active");
  ["mkt-ndx100","mkt-sectors","mkt-kospi","mkt-kosdaq"].forEach(function(id){
    g(id).style.display = "none";
  });
  if (tab === "ndx100")  g("mkt-ndx100").style.display  = "block";
  if (tab === "sectors") g("mkt-sectors").style.display = "block";
  if (tab === "kospi")   g("mkt-kospi").style.display   = "block";
  if (tab === "kosdaq")  g("mkt-kosdaq").style.display  = "block";

  if (!mktCache[tab]) mktLoadTab(tab);
}

function mktReload() {
  mktCache = {};
  mktLoadTab(mktCurTab);
}

function initMarket() {
  if (mktInited) return;
  mktInited = true;
  mktLoadTab("ndx100");
}

function mktLoadTab(tab) {
  g("mkt-loading").style.display = "block";
  var modeMap = { ndx100:"NDX100", sectors:"SECTORS", kospi:"KOSPI", kosdaq:"KOSDAQ" };
  var market  = modeMap[tab];

  fetch(PROXY + "?mode=batch&market=" + market + "&count=100")
    .then(function(r){ return r.json(); })
    .then(function(d) {
      g("mkt-loading").style.display = "none";
      if (!d.ok) { g("mkt-status").textContent = "오류: " + d.error; return; }
      var now = new Date();
      g("mkt-status").textContent = now.getHours() + ":" + ("0"+now.getMinutes()).slice(-2) + " 갱신";
      mktCache[tab] = d.data;
      if (tab === "ndx100")  renderNdx(d.data);
      if (tab === "sectors") renderSectors(d.data);
      if (tab === "kospi")   renderKrTable("kospi-table", d.data);
      if (tab === "kosdaq")  renderKrTable("kosdaq-table", d.data);
    })
    .catch(function(e) {
      g("mkt-loading").style.display = "none";
      g("mkt-status").textContent = "오류: " + e.message;
    });
}

// ── 등락 색상 ──
function mktClr(chg) {
  if (chg >  2) return "#1a3a2a";
  if (chg >  0) return "#162a1e";
  if (chg < -2) return "#3a1a1a";
  if (chg <  0) return "#2a1616";
  return "#1e1e28";
}
function mktTClr(chg) { return chg > 0 ? "#34d399" : chg < 0 ? "#f87171" : "#888"; }
function fmtCap(cap) {
  if (!cap) return "-";
  if (cap >= 1e12) return "$" + (cap/1e12).toFixed(2) + "T";
  if (cap >= 1e9)  return "$" + (cap/1e9).toFixed(1) + "B";
  return "$" + (cap/1e6).toFixed(0) + "M";
}
function fmtCapKr(cap) {
  if (!cap) return "-";
  var억 = cap / 1e8;
  if (억 >= 1e4) return (억/1e4).toFixed(1) + "조";
  return Math.round(억/100)/10 + "천억";
}

// ── NASDAQ 100 렌더 ──
function renderNdx(data) {
  if (!data || !data.length) return;

  // 등락률 정렬 (높은 순)
  var sorted = data.slice().sort(function(a,b){ return b.chg - a.chg; });

  // 가로 카드 행
  var row = g("ndx-row");
  row.innerHTML = sorted.map(function(s) {
    var bg  = mktClr(s.chg);
    var tc  = mktTClr(s.chg);
    var chgStr = (s.chg >= 0 ? "+" : "") + s.chg.toFixed(2) + "%";
    return "<div style='flex-shrink:0;width:80px;background:" + bg + ";border:1px solid #2a2a38;" +
      "border-radius:8px;padding:8px 6px;text-align:center;cursor:default'>" +
      "<div style='font-size:11px;font-weight:700;color:#f0f0f8;margin-bottom:3px'>" + s.sym + "</div>" +
      "<div style='font-size:10px;color:#888;margin-bottom:4px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis'>" + (s.name||"") + "</div>" +
      "<div style='font-size:12px;font-weight:800;color:" + tc + "'>" + chgStr + "</div>" +
      "<div style='font-size:10px;color:#555;margin-top:2px'>$" + (s.price||0).toFixed(2) + "</div>" +
      "</div>";
  }).join("");

  // 테이블 (원래 순서 = 시총순)
  var tbody = g("ndx-table");
  tbody.innerHTML = data.map(function(s, i) {
    var tc = mktTClr(s.chg);
    var chgStr = (s.chg >= 0 ? "+" : "") + s.chg.toFixed(2) + "%";
    return "<tr>" +
      "<td style='color:#555'>" + (i+1) + "</td>" +
      "<td><strong style='color:#a78bfa'>" + s.sym + "</strong></td>" +
      "<td style='color:#888;font-size:11px'>" + (s.name||"") + "</td>" +
      "<td>$" + (s.price||0).toFixed(2) + "</td>" +
      "<td style='color:" + tc + ";font-weight:700'>" + chgStr + "</td>" +
      "<td style='color:#555;font-size:11px'>" + fmtCap(s.cap) + "</td>" +
      "</tr>";
  }).join("");
}

// ── 섹터별 렌더 ──
function renderSectors(data) {
  var wrap = g("mkt-sectors");
  var html = "";
  // data = { 섹터명: [{sym,name,price,chg,cap},...] }
  Object.keys(data).forEach(function(sec) {
    var stocks = data[sec];
    html += "<div class='cw' style='margin-bottom:12px'>" +
      "<div class='ct' style='margin-bottom:8px'>" +
        "<strong style='color:#a78bfa'>" + sec + "</strong>" +
        "<span style='font-size:10px;color:#555;margin-left:8px'>" + stocks.length + "종목</span>" +
      "</div>" +
      "<div style='display:flex;gap:6px;overflow-x:auto;padding-bottom:6px;flex-wrap:nowrap'>" +
      stocks.map(function(s) {
        var bg = mktClr(s.chg), tc = mktTClr(s.chg);
        var chgStr = (s.chg >= 0 ? "+" : "") + s.chg.toFixed(2) + "%";
        return "<div style='flex-shrink:0;width:82px;background:" + bg + ";border:1px solid #2a2a38;" +
          "border-radius:8px;padding:8px 6px;text-align:center'>" +
          "<div style='font-size:11px;font-weight:700;color:#f0f0f8;margin-bottom:2px'>" + s.sym + "</div>" +
          "<div style='font-size:9px;color:#888;margin-bottom:4px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis'>" + (s.name||"") + "</div>" +
          "<div style='font-size:12px;font-weight:800;color:" + tc + "'>" + chgStr + "</div>" +
          "<div style='font-size:10px;color:#555;margin-top:2px'>$" + (s.price||0).toFixed(2) + "</div>" +
          "</div>";
      }).join("") +
      "</div></div>";
  });
  wrap.innerHTML = html || "<div style='color:#444;padding:20px'>데이터 없음</div>";
}

// ── 한국 테이블 렌더 ──
function renderKrTable(tbodyId, data) {
  if (!data || !data.length) return;
  var tbody = g(tbodyId);
  tbody.innerHTML = data.map(function(s, i) {
    var tc = mktTClr(s.chg);
    var chgStr = (s.chg >= 0 ? "+" : "") + s.chg.toFixed(2) + "%";
    var code = s.sym.replace(/\.(KS|KQ)$/, "");
    return "<tr>" +
      "<td style='color:#555'>" + (i+1) + "</td>" +
      "<td><strong style='color:#818cf8'>" + code + "</strong></td>" +
      "<td style='color:#888;font-size:11px'>" + (s.name||"") + "</td>" +
      "<td>₩" + Math.round(s.price||0).toLocaleString("ko-KR") + "</td>" +
      "<td style='color:" + tc + ";font-weight:700'>" + chgStr + "</td>" +
      "<td style='color:#555;font-size:11px'>" + fmtCapKr(s.cap) + "</td>" +
      "</tr>";
  }).join("");
}
</script>
