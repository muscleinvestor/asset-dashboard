<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f0f13;color:#e8e8f0;min-height:100vh;font-size:14px}

/* 환율 티커 */
.ticker-bar{background:#13131a;border-bottom:1px solid #1e1e2a;padding:7px 16px;display:flex;align-items:center;gap:20px;font-size:12px}
.ticker-item{display:flex;align-items:center;gap:6px}
.ticker-label{color:#555;font-size:11px}
.ticker-value{color:#e8e8f0;font-weight:600}
.ticker-change{font-size:11px}
.ticker-dot{width:6px;height:6px;border-radius:50%;background:#34d399;animation:pulse 2s infinite;display:inline-block}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

.nav{display:flex;gap:2px;padding:12px 16px 0;border-bottom:1px solid #1e1e2a;overflow-x:auto}
.nav-btn{padding:8px 16px;border:none;background:none;color:#666;cursor:pointer;font-size:13px;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .2s;white-space:nowrap}
.nav-btn.active{color:#a78bfa;border-bottom-color:#a78bfa}
.nav-btn:hover{color:#c4b5fd}
.page{display:none;padding:16px}
.page.active{display:block}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:16px}
.card{background:#1a1a24;border-radius:12px;padding:14px;border:1px solid #2a2a38}
.card-label{font-size:11px;color:#555;margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
.card-value{font-size:20px;font-weight:600}
.card-sub{font-size:12px;margin-top:3px}
.pos{color:#34d399}.neg{color:#f87171}
.chart-wrap{background:#1a1a24;border-radius:12px;padding:14px;border:1px solid #2a2a38;margin-bottom:14px}
.chart-title{font-size:12px;color:#666;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
.table-wrap{background:#1a1a24;border-radius:12px;border:1px solid #2a2a38;overflow:hidden;margin-bottom:14px}
.table-header{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;border-bottom:1px solid #2a2a38}
.table-header h3{font-size:13px;font-weight:500}
.btn{padding:6px 12px;border-radius:8px;border:1px solid #3a3a4a;background:#252530;color:#c4b5fd;cursor:pointer;font-size:12px;transition:all .2s}
.btn:hover{background:#2e2e40;border-color:#7c3aed}
.btn-danger{color:#f87171;border-color:#3a2a2a;background:transparent}
.btn-danger:hover{background:#2a1a1a}
.btn-sm{padding:3px 8px;font-size:11px}
.btn-group{display:flex;gap:4px}
.period-btn{padding:4px 10px;border-radius:6px;border:1px solid #2a2a38;background:transparent;color:#666;cursor:pointer;font-size:11px;transition:all .2s}
.period-btn.active{background:#2d1f4a;color:#a78bfa;border-color:#7c3aed}
table{width:100%;border-collapse:collapse}
th{padding:8px 10px;text-align:left;font-size:10px;color:#444;font-weight:500;border-bottom:1px solid #1e1e2a;text-transform:uppercase;white-space:nowrap}
td{padding:8px 10px;border-bottom:1px solid #181820;font-size:12px;vertical-align:middle}
tr:last-child td{border:none}
tr:hover td{background:rgba(167,139,250,.03)}
.badge{padding:2px 7px;border-radius:20px;font-size:10px;font-weight:500;white-space:nowrap}
.badge-crypto{background:#2d1f4a;color:#a78bfa}
.badge-us{background:#1a2a3a;color:#38bdf8}
.badge-kr{background:#1a2540;color:#818cf8}
.badge-cash{background:#1a3a2a;color:#34d399}
.badge-sector{background:#2a2520;color:#f59e0b;font-size:10px}
.edit-input{background:#1e1e28;border:1px solid #3a3a4a;border-radius:6px;color:#e8e8f0;padding:3px 6px;width:80px;font-size:11px}
.edit-input-wide{width:110px}
.form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px;margin-bottom:12px}
.form-group label{display:block;font-size:10px;color:#555;margin-bottom:4px}
.form-group input,.form-group select{width:100%;background:#141418;border:1px solid #2a2a38;border-radius:7px;color:#e8e8f0;padding:7px 9px;font-size:12px}
.form-group select option{background:#1a1a24}
.pnl-summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:14px}
.pnl-card{background:#1a1a24;border-radius:10px;padding:12px;border:1px solid #2a2a38}
.loading{display:inline-block;width:10px;height:10px;border:2px solid #333;border-top-color:#a78bfa;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:4px}
@keyframes spin{to{transform:rotate(360deg)}}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:#1a1a24;border-radius:14px;border:1px solid #2a2a38;padding:20px;width:420px;max-width:95vw;max-height:90vh;overflow-y:auto}
.modal h3{margin-bottom:14px;font-size:14px;font-weight:500}
.cat-total{background:#141418;border-radius:8px;padding:10px 14px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center}

/* 이중 가격 표시 */
.price-krw{font-size:12px;color:#e8e8f0}
.price-usd{font-size:10px;color:#555;margin-top:1px}
</style>

</head>
<body>

<!-- 환율 티커 바 -->

<div class="ticker-bar">
  <div class="ticker-item">
    <span class="ticker-dot"></span>
    <span class="ticker-label">USDT/KRW</span>
    <span class="ticker-value" id="tk-usdtkrw">--</span>
    <span class="ticker-change" id="tk-usdtkrw-chg"></span>
  </div>
  <div class="ticker-item">
    <span class="ticker-label">BTC/KRW</span>
    <span class="ticker-value" id="tk-btc">--</span>
  </div>
  <div class="ticker-item">
    <span class="ticker-label">ETH/KRW</span>
    <span class="ticker-value" id="tk-eth">--</span>
  </div>
  <div style="margin-left:auto;font-size:11px;color:#333" id="tk-time">--</div>
</div>

<nav class="nav">
  <button class="nav-btn active" onclick="showPage('dashboard',this)">대시보드</button>
  <button class="nav-btn" onclick="showPage('portfolio',this)">포트폴리오</button>
  <button class="nav-btn" onclick="showPage('tradelog',this)">매매일지</button>
  <button class="nav-btn" onclick="showPage('chartpage',this)">수익차트</button>
</nav>

<!-- 대시보드 -->

<div id="dashboard" class="page active">
  <div class="cards">
    <div class="card"><div class="card-label">총 자산</div><div class="card-value" id="c-total">--</div></div>
    <div class="card"><div class="card-label">총 투자금</div><div class="card-value" id="c-cost">--</div></div>
    <div class="card"><div class="card-label">평가손익</div><div class="card-value" id="c-pnl">--</div><div class="card-sub" id="c-pnlpct"></div></div>
    <div class="card"><div class="card-label">갱신시각</div><div class="card-value" style="font-size:13px;padding-top:3px" id="c-time"><span class="loading"></span>로딩중</div></div>
  </div>

  <div class="chart-wrap" style="padding:10px 14px">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <span style="font-size:11px;color:#555">수익률 기준</span>
      <div class="btn-group" id="period-btns">
        <button class="period-btn active" onclick="setPeriod('total',this)">총수익</button>
        <button class="period-btn" onclick="setPeriod('day',this)">일</button>
        <button class="period-btn" onclick="setPeriod('week',this)">주</button>
        <button class="period-btn" onclick="setPeriod('month',this)">월</button>
        <button class="period-btn" onclick="setPeriod('year',this)">년</button>
      </div>
    </div>
  </div>

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px">
    <div class="chart-wrap" style="margin:0">
      <div class="chart-title">자산 배분</div>
      <div style="position:relative;height:200px"><canvas id="donut-chart"></canvas></div>
    </div>
    <div class="chart-wrap" style="margin:0">
      <div class="chart-title">카테고리별 수익률</div>
      <div style="position:relative;height:200px"><canvas id="cat-chart"></canvas></div>
    </div>
  </div>
  <div class="chart-wrap">
    <div class="chart-title">카테고리 소계</div>
    <div id="cat-summary"></div>
  </div>
</div>

<!-- 포트폴리오 -->

<div id="portfolio" class="page">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
    <div style="font-size:12px;color:#444"><span style="width:7px;height:7px;border-radius:50%;background:#34d399;display:inline-block;margin-right:6px;animation:pulse 2s infinite"></span><span id="r-status">30초 자동갱신</span></div>

  </div>
  <div class="table-wrap">
    <div style="overflow-x:auto">
      <table>
        <thead><tr>
          <th>종목</th><th>구분</th><th>섹터</th><th>수량</th><th>평균매입가</th><th>현재가 (KRW/USD)</th><th>평가금액</th><th>손익</th><th>수익률</th><th>수정</th>
        </tr></thead>
        <tbody id="port-table"></tbody>
      </table>
    </div>

</div>

<!-- 매매일지 -->

<div id="tradelog" class="page">
  <div class="pnl-summary" id="pnl-cards"></div>
  <div class="chart-wrap">
    <div class="chart-title" style="margin-bottom:12px">거래 기록 추가</div>
    <div class="form-grid">
      <div class="form-group"><label>날짜</label><input type="date" id="t-date"></div>
      <div class="form-group"><label>종목</label><select id="t-sym"><option value="">선택</option></select></div>
      <div class="form-group"><label>매수/매도</label><select id="t-side"><option value="buy">매수</option><option value="sell">매도</option></select></div>
      <div class="form-group"><label>수량</label><input type="number" id="t-qty" placeholder="0" step="any"></div>
      <div class="form-group"><label>체결가 (₩)</label><input type="number" id="t-price" placeholder="0"></div>
      <div class="form-group"><label>수수료 (₩)</label><input type="number" id="t-fee" placeholder="0"></div>
    </div>

  </div>
  <div class="table-wrap">

    <div style="overflow-x:auto">
      <table>
        <thead><tr><th>날짜</th><th>종목</th><th>매수/매도</th><th>수량</th><th>체결가</th><th>수수료</th><th>실현손익</th><th></th></tr></thead>
        <tbody id="trade-table"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- 수익차트 -->

<div id="chartpage" class="page">
  <div class="chart-wrap">
    <div class="chart-title">
      <span>총 자산 추이 (₩)</span>
      <div class="btn-group">
        <button class="period-btn active" onclick="setAssetChartRange('all',this)">전체</button>
        <button class="period-btn" onclick="setAssetChartRange('week',this)">1주</button>

  </div>

    <div style="position:relative;height:200px"><canvas id="monthly-chart"></canvas></div>

</div>

<!-- 자산 추가 모달 -->

<div class="modal-overlay" id="add-modal">
  <div class="modal">
    <h3>자산 추가</h3>
    <div class="form-grid" style="grid-template-columns:1fr 1fr">
      <div class="form-group"><label>심볼/코드</label><input type="text" id="m-sym" placeholder="BTC, AAPL, 005930"></div>

        <select id="m-sector">
          <option value="">-</option>
          <option>IT/기술</option><option>금융</option><option>헬스케어</option>
          <option>에너지</option><option>소비재</option><option>산업재</option>
          <option>통신</option><option>유틸리티</option><option>부동산</option>
          <option>소재</option><option>레이어1</option><option>DeFi</option>
          <option>NFT/게임</option><option>스테이블코인</option><option>기타</option>
        </select>
      </div>

      <div class="form-group"><label>평균매입가 (₩)</label><input type="number" id="m-cost" placeholder="0"></div>
      <div class="form-group"><label>현재가 (₩, 선택)</label><input type="number" id="m-price" placeholder="자동조회"></div>
    </div>
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:8px">
      <button class="btn" onclick="closeModal()">취소</button>
      <button class="btn" onclick="addAsset()" style="background:#2d1f4a;border-color:#7c3aed">추가</button>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>

<script>
const PROXY = "https://yahoo-proxy.realromanticist777.workers.dev";
const fmt = n => '₩' + Math.round(n).toLocaleString('ko-KR');
const fmtUSD = n => '$' + (n).toLocaleString('en-US', {minimumFractionDigits:2,maximumFractionDigits:2});
const fmtPct = n => (n>=0?'+':'')+n.toFixed(2)+'%';
const clr = n => n>=0?'#34d399':'#f87171';
const clrClass = n => n>=0?'pos':'neg';

let currentPeriod = 'total';
let usdKrw = 1330;

let assets = [
  {id:1,symbol:'BTC',name:'비트코인',cat:'crypto',sector:'레이어1',qty:.5,avgCost:55000000,price:0,priceHistory:{}},
  {id:2,symbol:'ETH',name:'이더리움',cat:'crypto',sector:'레이어1',qty:3,avgCost:3200000,price:0,priceHistory:{}},
  {id:3,symbol:'AAPL',name:'애플',cat:'us',sector:'IT/기술',qty:10,avgCost:180000,price:0,priceHistory:{}},
  {id:4,symbol:'NVDA',name:'엔비디아',cat:'us',sector:'IT/기술',qty:5,avgCost:600000,price:0,priceHistory:{}},
  {id:5,symbol:'005930',name:'삼성전자',cat:'kr',sector:'IT/기술',qty:50,avgCost:71000,price:0,priceHistory:{}},
  {id:6,symbol:'SAVINGS',name:'정기예금',cat:'cash',sector:'',qty:1,avgCost:5000000,price:5000000,priceHistory:{}},
];
let trades = [];
let assetHistory = [];
let editingId = null;
let donutChart, catChart, retChart, assetChart, monthlyChart;
let assetChartRange = 'all';

const catLabel = {crypto:'가상자산',us:'미국주식',kr:'한국주식',cash:'현금/예적금'};
const catBadgeClass = {crypto:'badge-crypto',us:'badge-us',kr:'badge-kr',cash:'badge-cash'};
const catColors = {crypto:'#7c3aed',us:'#0ea5e9',kr:'#6366f1',cash:'#10b981'};

// ── 업비트 USDT/KRW 환율 ──────────────────────────────────
async function refreshUSDKRW(){
  try{
    const r=await fetch('https://api.upbit.com/v1/ticker?markets=KRW-USDT');
    const d=await r.json();
    if(d&&d[0]&&d[0].trade_price){
      usdKrw=d[0].trade_price;
      const chg=d[0].signed_change_rate*100;
      document.getElementById('tk-usdtkrw').textContent='₩'+Math.round(usdKrw).toLocaleString('ko-KR');
      const chgEl=document.getElementById('tk-usdtkrw-chg');
      chgEl.textContent=fmtPct(chg);
      chgEl.className='ticker-change '+(chg>=0?'pos':'neg');
      return;
    }
  }catch(e){}
  // fallback binance
  try{
    const r=await fetch('https://api.binance.com/api/v3/ticker/price?symbol=USDTKRW');
    const d=await r.json();
    if(d.price){usdKrw=parseFloat(d.price);document.getElementById('tk-usdtkrw').textContent='₩'+Math.round(usdKrw).toLocaleString('ko-KR');}
  }catch(e){}
}

// ── 가상자산 가격 (업비트 KRW 직접) ──────────────────────
async function fetchCryptoPrice(sym){
  try{
    const r=await fetch(`https://api.upbit.com/v1/ticker?markets=KRW-${sym.toUpperCase()}`);
    const d=await r.json();
    if(d&&d[0]&&d[0].trade_price) return d[0].trade_price;
  }catch(e){}
  try{
    const r=await fetch(`https://api.binance.com/api/v3/ticker/price?symbol=${sym.toUpperCase()}USDT`);
    const d=await r.json();
    if(d.price) return parseFloat(d.price)*usdKrw;
  }catch(e){}
  return null;
}

async function fetchStockPrice(sym,cat){
  try{
    const ticker=cat==='kr'?sym+'.KS':sym;
    const r=await fetch(`${PROXY}?ticker=${ticker}&interval=1d&range=5d`);
    const d=await r.json();
    const res=d?.chart?.result?.[0];
    if(!res) return null;
    const price=res.meta?.regularMarketPrice;
    if(!price) return null;
    return cat==='kr'?price:price*usdKrw;
  }catch(e){}
  return null;
}

async function fetchHistoricalPrice(sym,cat){
  try{
    const ticker=cat==='kr'?sym+'.KS':cat==='us'?sym:null;
    if(!ticker) return {};
    const r=await fetch(`${PROXY}?ticker=${ticker}&interval=1d&range=1y`);
    const d=await r.json();
    const res=d?.chart?.result?.[0];
    if(!res) return {};
    const ts=res.timestamps||[];
    const closes=res.indicators?.quote?.[0]?.close||[];
    const hist={};
    ts.forEach((t,i)=>{if(closes[i]) hist[t]=closes[i]*(cat==='us'?usdKrw:1);});
    return hist;
  }catch(e){}
  return {};
}

async function fetchPrices(){
  document.getElementById('c-time').innerHTML='<span class="loading"></span>갱신중...';
  document.getElementById('r-status').textContent='가격 조회중...';
  await refreshUSDKRW();

  // 티커 BTC/ETH
  try{
    const r=await fetch('https://api.upbit.com/v1/ticker?markets=KRW-BTC,KRW-ETH');
    const d=await r.json();
    d.forEach(t=>{
      if(t.market==='KRW-BTC') document.getElementById('tk-btc').textContent='₩'+Math.round(t.trade_price).toLocaleString('ko-KR');
      if(t.market==='KRW-ETH') document.getElementById('tk-eth').textContent='₩'+Math.round(t.trade_price).toLocaleString('ko-KR');
    });
  }catch(e){}

  for(let a of assets){
    if(a.cat==='cash'){a.price=a.avgCost;continue;}
    let p=null;
    if(a.cat==='crypto') p=await fetchCryptoPrice(a.symbol);
    else p=await fetchStockPrice(a.symbol,a.cat);
    if(p) a.price=p;
    else if(!a.price) a.price=a.avgCost;
    if((a.cat==='us'||a.cat==='kr')&&Object.keys(a.priceHistory).length===0){
      a.priceHistory=await fetchHistoricalPrice(a.symbol,a.cat);
    }
  }

  const tv=assets.reduce((s,a)=>s+a.price*a.qty,0);
  const tc=assets.reduce((s,a)=>s+a.avgCost*a.qty,0);
  const pct=tc?((tv-tc)/tc*100):0;
  assetHistory.push({ts:Date.now(),totalVal:tv,pct:parseFloat(pct.toFixed(2))});
  if(assetHistory.length>200) assetHistory.shift();

  const t=new Date();
  const timeStr=`${t.getHours()}:${String(t.getMinutes()).padStart(2,'0')} 갱신`;
  document.getElementById('c-time').textContent=timeStr;
  document.getElementById('tk-time').textContent=timeStr;
  document.getElementById('r-status').textContent='30초 자동갱신';
  renderAll();
}

// ── Period ────────────────────────────────────────────────
function setPeriod(p,btn){
  currentPeriod=p;
  document.querySelectorAll('#period-btns .period-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderAll();
}

function getPeriodPct(a){
  if(currentPeriod==='total'){
    const cost=a.avgCost*a.qty,val=a.price*a.qty;
    return cost?((val-cost)/cost*100):0;
  }
  const msAgo={day:86400000,week:7*86400000,month:30*86400000,year:365*86400000}[currentPeriod]||0;
  const targetTs=(Date.now()-msAgo)/1000;
  const hist=a.priceHistory||{};
  const keys=Object.keys(hist).map(Number).sort();
  if(!keys.length){const c=a.avgCost*a.qty,v=a.price*a.qty;return c?((v-c)/c*100):0;}
  const closest=keys.reduce((acc,k)=>Math.abs(k-targetTs)<Math.abs(acc-targetTs)?k:acc,keys[0]);
  const prevPrice=hist[closest];
  if(!prevPrice){const c=a.avgCost*a.qty,v=a.price*a.qty;return c?((v-c)/c*100):0;}
  return ((a.price-prevPrice)/prevPrice*100);
}

// ── Render ────────────────────────────────────────────────
function renderAll(){
  renderSummary();
  renderPortfolio();
  renderDashCharts();
  renderTradeSummary();
  renderTradeTable();
  renderChartPage();
  updateTradeSym();
}

function renderSummary(){
  const tv=assets.reduce((s,a)=>s+a.price*a.qty,0);
  const tc=assets.reduce((s,a)=>s+a.avgCost*a.qty,0);
  const pnl=tv-tc,pct=tc?(pnl/tc*100):0;
  document.getElementById('c-total').textContent=fmt(tv);
  document.getElementById('c-cost').textContent=fmt(tc);
  document.getElementById('c-pnl').innerHTML=`<span class="${clrClass(pnl)}">${fmt(pnl)}</span>`;
  document.getElementById('c-pnlpct').innerHTML=`<span class="${clrClass(pct)}">${fmtPct(pct)}</span>`;

  const cats=['crypto','us','kr','cash'];
  document.getElementById('cat-summary').innerHTML=cats.map(c=>{
    const ca=assets.filter(a=>a.cat===c);
    const v=ca.reduce((s,a)=>s+a.price*a.qty,0);
    const co=ca.reduce((s,a)=>s+a.avgCost*a.qty,0);
    const p=co?((v-co)/co*100):0;
    const share=tv?(v/tv*100):0;
    return `<div class="cat-total">
      <div style="display:flex;align-items:center;gap:8px">
        <span style="width:8px;height:8px;border-radius:50%;background:${catColors[c]};display:inline-block"></span>
        <span style="font-size:13px">${catLabel[c]}</span>
        <span style="font-size:11px;color:#444">${share.toFixed(1)}%</span>
      </div>
      <div style="text-align:right">
        <div style="font-size:14px;font-weight:600">${fmt(v)}</div>
        <div style="font-size:11px" class="${clrClass(p)}">${fmtPct(p)}</div>
      </div>
    </div>`;
  }).join('');
}

function renderPortfolio(){
  const tbody=document.getElementById('port-table');
  if(!assets.length){tbody.innerHTML='<tr><td colspan="10" style="text-align:center;color:#333;padding:24px">자산을 추가해주세요</td></tr>';return;}
  const cats=['crypto','us','kr','cash'];
  let rows='';
  for(const c of cats){
    const group=assets.filter(a=>a.cat===c);
    if(!group.length) continue;
    const gv=group.reduce((s,a)=>s+a.price*a.qty,0);
    const gc=group.reduce((s,a)=>s+a.avgCost*a.qty,0);
    const gp=gc?((gv-gc)/gc*100):0;
    rows+=`<tr style="background:#111116"><td colspan="7" style="padding:6px 10px;font-size:11px;color:#555">${catLabel[c]}</td>
      <td colspan="3" style="padding:6px 10px;text-align:right;font-size:11px" class="${clrClass(gp)}">${fmt(gv)} &nbsp;${fmtPct(gp)}</td></tr>`;
    for(const a of group){
      const val=a.price*a.qty;
      const pnl=val-a.avgCost*a.qty;
      const pct=getPeriodPct(a);
      // 이중 가격 표시 (crypto만 USD도 표시)
      const priceCell = a.cat==='crypto'
        ? `<div class="price-krw">${fmt(a.price)}</div><div class="price-usd">${fmtUSD(a.price/usdKrw)}</div>`
        : `<div class="price-krw">${fmt(a.price)}</div>`;
      const costCell = a.cat==='crypto'
        ? `<div class="price-krw">${fmt(a.avgCost)}</div><div class="price-usd">${fmtUSD(a.avgCost/usdKrw)}</div>`
        : `<div class="price-krw">${fmt(a.avgCost)}</div>`;

      if(editingId===a.id){
        rows+=`<tr>
          <td><strong>${a.name}</strong><br><span style="color:#444;font-size:10px">${a.symbol}</span></td>
          <td><span class="badge ${catBadgeClass[a.cat]}">${catLabel[a.cat]}</span></td>
          <td><input class="edit-input edit-input-wide" id="e-sec-${a.id}" value="${a.sector||''}"></td>
          <td><input class="edit-input" id="e-qty-${a.id}" value="${a.qty}" type="number" step="any"></td>
          <td><input class="edit-input" id="e-cost-${a.id}" value="${Math.round(a.avgCost)}" type="number"></td>
          <td><input class="edit-input" id="e-price-${a.id}" value="${Math.round(a.price)}" type="number"></td>
          <td>${fmt(val)}</td>
          <td class="${clrClass(pnl)}">${fmt(pnl)}</td>
          <td class="${clrClass(pct)}">${fmtPct(pct)}</td>
          <td style="white-space:nowrap">
            <button class="btn btn-sm" onclick="saveEdit(${a.id})">저장</button>
            <button class="btn btn-sm btn-danger" onclick="editingId=null;renderPortfolio()">취소</button>
          </td>
        </tr>`;
      } else {
        rows+=`<tr>
          <td><strong>${a.name}</strong><br><span style="color:#444;font-size:10px">${a.symbol}</span></td>
          <td><span class="badge ${catBadgeClass[a.cat]}">${catLabel[a.cat]}</span></td>
          <td>${a.sector?`<span class="badge badge-sector">${a.sector}</span>`:'-'}</td>
          <td>${a.qty}</td>
          <td>${costCell}</td>
          <td>${priceCell}</td>
          <td>${fmt(val)}</td>
          <td class="${clrClass(pnl)}">${fmt(pnl)}</td>
          <td class="${clrClass(pct)}">${fmtPct(pct)}</td>
          <td style="white-space:nowrap">
            <button class="btn btn-sm" onclick="editingId=${a.id};renderPortfolio()">수정</button>
            <button class="btn btn-sm btn-danger" onclick="delAsset(${a.id})">삭제</button>
          </td>
        </tr>`;
      }
    }
  }
  tbody.innerHTML=rows;
}

function saveEdit(id){
  const a=assets.find(x=>x.id===id);
  a.sector=document.getElementById(`e-sec-${id}`).value.trim();
  a.qty=parseFloat(document.getElementById(`e-qty-${id}`).value)||a.qty;
  a.avgCost=parseFloat(document.getElementById(`e-cost-${id}`).value)||a.avgCost;
  a.price=parseFloat(document.getElementById(`e-price-${id}`).value)||a.price;
  editingId=null;renderAll();
}
function delAsset(id){assets=assets.filter(a=>a.id!==id);renderAll();}

function renderDashCharts(){
  const cats=['crypto','us','kr','cash'];
  const vals=cats.map(c=>assets.filter(a=>a.cat===c).reduce((s,a)=>s+a.price*a.qty,0));
  if(donutChart) donutChart.destroy();
  donutChart=new Chart(document.getElementById('donut-chart'),{
    type:'doughnut',
    data:{labels:cats.map(c=>catLabel[c]),datasets:[{data:vals,backgroundColor:cats.map(c=>catColors[c]),borderWidth:0,hoverOffset:4}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{color:'#666',font:{size:10},padding:8,boxWidth:8}}}}
  });
  const pcts=cats.map(c=>{
    const ca=assets.filter(a=>a.cat===c);
    const v=ca.reduce((s,a)=>s+a.price*a.qty,0),co=ca.reduce((s,a)=>s+a.avgCost*a.qty,0);
    return co?parseFloat(((v-co)/co*100).toFixed(2)):0;
  });
  if(catChart) catChart.destroy();
  catChart=new Chart(document.getElementById('cat-chart'),{
    type:'bar',
    data:{labels:cats.map(c=>catLabel[c]),datasets:[{data:pcts,backgroundColor:pcts.map(p=>p>=0?'#10b981':'#f87171'),borderRadius:5}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
      scales:{x:{ticks:{color:'#555',font:{size:10}},grid:{color:'#1a1a22'}},y:{ticks:{color:'#555',callback:v=>v+'%'},grid:{color:'#1a1a22'}}}}
  });
}

function setAssetChartRange(r,btn){
  assetChartRange=r;
  document.querySelectorAll('#chartpage .period-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderChartPage();
}

function renderChartPage(){
  const msMap={week:7*86400000,month:30*86400000};
  const cutoff=assetChartRange==='all'?0:Date.now()-msMap[assetChartRange];
  const hist=assetHistory.filter(h=>h.ts>=cutoff);
  const labels=hist.map(h=>{const d=new Date(h.ts);return `${d.getMonth()+1}/${d.getDate()} ${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}`;});
  if(assetChart) assetChart.destroy();
  assetChart=new Chart(document.getElementById('asset-chart'),{
    type:'line',
    data:{labels,datasets:[{data:hist.map(h=>Math.round(h.totalVal)),borderColor:'#a78bfa',backgroundColor:'rgba(124,58,237,.08)',fill:true,tension:.3,pointRadius:hist.length>30?0:3,pointBackgroundColor:'#a78bfa'}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
      scales:{x:{ticks:{color:'#555',maxRotation:45,font:{size:10},maxTicksLimit:8},grid:{color:'#1a1a22'}},
              y:{ticks:{color:'#555',callback:v=>{const m=v/100000000;return m>=1?m.toFixed(1)+'억':Math.round(v/10000)+'만'}},grid:{color:'#1a1a22'}}}}
  });
  if(retChart) retChart.destroy();
  retChart=new Chart(document.getElementById('ret-chart'),{
    type:'line',
    data:{labels,datasets:[{data:hist.map(h=>h.pct),borderColor:'#38bdf8',backgroundColor:'rgba(56,189,248,.06)',fill:true,tension:.3,pointRadius:hist.length>30?0:3,pointBackgroundColor:'#38bdf8'}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
      scales:{x:{ticks:{color:'#555',maxRotation:45,font:{size:10},maxTicksLimit:8},grid:{color:'#1a1a22'}},
              y:{ticks:{color:'#555',callback:v=>v+'%'},grid:{color:'#1a1a22'}}}}
  });
  const monthly={};
  trades.filter(t=>t.side==='sell').forEach(t=>{const m=t.date.substring(0,7);monthly[m]=(monthly[m]||0)+t.realizedPnl;});
  const mk=Object.keys(monthly).sort(),mv=mk.map(k=>Math.round(monthly[k]));
  if(monthlyChart) monthlyChart.destroy();
  monthlyChart=new Chart(document.getElementById('monthly-chart'),{
    type:'bar',
    data:{labels:mk.length?mk:['데이터없음'],datasets:[{data:mk.length?mv:[0],backgroundColor:mv.map(v=>v>=0?'#10b981':'#f87171'),borderRadius:5}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
      scales:{x:{ticks:{color:'#555'},grid:{color:'#1a1a22'}},y:{ticks:{color:'#555',callback:v=>(v>=0?'+':'')+Math.round(v/10000)+'만'},grid:{color:'#1a1a22'}}}}
  });
}

function addTrade(){
  const sym=document.getElementById('t-sym').value,side=document.getElementById('t-side').value;
  const qty=parseFloat(document.getElementById('t-qty').value),price=parseFloat(document.getElementById('t-price').value);
  const fee=parseFloat(document.getElementById('t-fee').value)||0,date=document.getElementById('t-date').value;
  if(!sym||!qty||!price||!date){alert('날짜, 종목, 수량, 가격을 입력해주세요');return;}
  trades.push({id:Date.now(),date,symbol:sym,side,qty,price,fee,realizedPnl:0});
  calcPnl();renderAll();
  document.getElementById('t-qty').value='';document.getElementById('t-price').value='';document.getElementById('t-fee').value='';
}

function calcPnl(){
  const lots={};
  trades.sort((a,b)=>new Date(a.date)-new Date(b.date));
  for(let t of trades){
    if(!lots[t.symbol]) lots[t.symbol]=[];
    t.realizedPnl=0;
    if(t.side==='buy'){lots[t.symbol].push({qty:t.qty,price:t.price});}
    else{
      let rem=t.qty,cost=0;
      while(rem>0&&lots[t.symbol].length){
        const lot=lots[t.symbol][0];
        if(lot.qty<=rem){cost+=lot.qty*lot.price;rem-=lot.qty;lots[t.symbol].shift();}
        else{cost+=rem*lot.price;lot.qty-=rem;rem=0;}
      }
      t.realizedPnl=(t.price*t.qty)-cost-t.fee;
    }
  }
}

function renderTradeSummary(){
  const sells=trades.filter(t=>t.side==='sell');
  const totalR=sells.reduce((s,t)=>s+t.realizedPnl,0),totalF=trades.reduce((s,t)=>s+t.fee,0);
  const wins=sells.filter(t=>t.realizedPnl>0).length,wr=sells.length?(wins/sells.length*100).toFixed(0):0;
  document.getElementById('pnl-cards').innerHTML=`
    <div class="pnl-card"><div class="card-label">총 실현손익</div><div class="card-value ${clrClass(totalR)}" style="font-size:18px">${fmt(totalR)}</div></div>
    <div class="pnl-card"><div class="card-label">총 수수료</div><div class="card-value" style="font-size:18px;color:#f59e0b">${fmt(totalF)}</div></div>
    <div class="pnl-card"><div class="card-label">매도 거래수</div><div class="card-value" style="font-size:18px">${sells.length}건</div></div>
    <div class="pnl-card"><div class="card-label">승률</div><div class="card-value" style="font-size:18px">${wr}%</div></div>`;
}

function renderTradeTable(){
  const tbody=document.getElementById('trade-table');
  const sorted=[...trades].sort((a,b)=>new Date(b.date)-new Date(a.date));
  if(!sorted.length){tbody.innerHTML='<tr><td colspan="8" style="text-align:center;color:#333;padding:24px">거래 내역이 없습니다</td></tr>';return;}
  tbody.innerHTML=sorted.map(t=>`<tr>
    <td>${t.date}</td><td><strong>${t.symbol}</strong></td>
    <td><span style="padding:2px 7px;border-radius:12px;font-size:10px;${t.side==='buy'?'background:#1a3a2a;color:#34d399':'background:#3a1a1a;color:#f87171'}">${t.side==='buy'?'매수':'매도'}</span></td>
    <td>${t.qty}</td><td>${fmt(t.price)}</td><td>${fmt(t.fee)}</td>
    <td class="${t.side==='sell'?clrClass(t.realizedPnl):''}">${t.side==='sell'?fmt(t.realizedPnl):'-'}</td>
    <td><button class="btn btn-sm btn-danger" onclick="delTrade(${t.id})">삭제</button></td>
  </tr>`).join('');
}
function delTrade(id){trades=trades.filter(t=>t.id!==id);calcPnl();renderAll();}

function updateTradeSym(){
  const sel=document.getElementById('t-sym'),cur=sel.value;
  sel.innerHTML='<option value="">선택</option>'+assets.map(a=>`<option value="${a.symbol}"${a.symbol===cur?' selected':''}>${a.name} (${a.symbol})</option>`).join('');
}

function openAddModal(){document.getElementById('add-modal').classList.add('open');}
function closeModal(){document.getElementById('add-modal').classList.remove('open');}
function addAsset(){
  const sym=document.getElementById('m-sym').value.trim().toUpperCase();
  const name=document.getElementById('m-name').value.trim();
  const cat=document.getElementById('m-cat').value,sector=document.getElementById('m-sector').value;
  const qty=parseFloat(document.getElementById('m-qty').value),cost=parseFloat(document.getElementById('m-cost').value);
  const price=parseFloat(document.getElementById('m-price').value)||cost;
  if(!sym||!name||!qty||!cost){alert('심볼, 종목명, 수량, 매입가를 입력해주세요');return;}
  assets.push({id:Date.now(),symbol:sym,name,cat,sector,qty,avgCost:cost,price,priceHistory:{}});
  closeModal();renderAll();
  if(cat!=='cash') fetchPrices();
}

function showPage(id,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  btn.classList.add('active');
}

document.getElementById('t-date').value=new Date().toISOString().split('T')[0];
fetchPrices();
setInterval(fetchPrices,30000);
</script>
